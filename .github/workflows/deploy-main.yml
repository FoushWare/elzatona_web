name: Deploy Main (CI -> CD) [DISABLED]

# DISABLED: Use manual-deploy-parallel.yml for manual parallel deployment
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force deploy (for testing)"
        required: false
        default: "false"

concurrency:
  group: deploy-main-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  gate-ci:
    name: Validate Required CI Workflows
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      can_deploy: ${{ steps.validate.outputs.can_deploy }}
      head_sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Validate CI success for main
        id: validate
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "CI workflow did not succeed; skipping deployment."
          fi

  detect-changes:
    name: Detect Changed Deploy Targets
    needs: gate-ci
    if: needs.gate-ci.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      website_changed: ${{ steps.changed.outputs.website_changed }}
      admin_changed: ${{ steps.changed.outputs.admin_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate-ci.outputs.head_sha }}
          fetch-depth: 2

      - name: Detect changed files for deploy targets
        id: changed
        run: |
          set -euo pipefail

          # Temporary hotfix: deploy both apps on every successful main CI run.
          # Restore selective detection in a follow-up PR after the deployment issue is resolved.
          echo "website_changed=true" >> "$GITHUB_OUTPUT"
          echo "admin_changed=true" >> "$GITHUB_OUTPUT"
          echo "Changed files detection bypassed for forced deploy."
          exit 0

          TARGET_SHA="${{ needs.gate-ci.outputs.head_sha }}"
          PARENT_COUNT="$(git rev-list --parents -n 1 "$TARGET_SHA" | awk '{print NF-1}')"

          if [ "$PARENT_COUNT" -ge 2 ]; then
            # Merge commit on main: compare against first parent to include PR changes.
            CHANGED_FILES="$(git diff --name-only "$TARGET_SHA^1" "$TARGET_SHA")"
          else
            # Regular commit on main.
            CHANGED_FILES="$(git diff --name-only "$TARGET_SHA^" "$TARGET_SHA" || true)"
          fi

          if [ -z "$CHANGED_FILES" ]; then
            # Defensive fallback: never skip both deploy targets because of detection failure.
            echo "No changed files detected for $TARGET_SHA; forcing website/admin deploy to avoid false skip."
            echo "website_changed=true" >> "$GITHUB_OUTPUT"
            echo "admin_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files on main push:"
          echo "$CHANGED_FILES"

          WEBSITE_PATTERN='^(apps/website/|libs/common-ui/|libs/contexts/|libs/types/|libs/utilities/|libs/hooks/|libs/shared-atoms/|libs/shared-components/)'
          ADMIN_PATTERN='^(apps/admin/|libs/common-ui/|libs/contexts/|libs/types/|libs/utilities/|libs/hooks/|libs/shared-atoms/|libs/shared-components/)'

          WEBSITE_CHANGED=false
          ADMIN_CHANGED=false

          if echo "$CHANGED_FILES" | grep -Eq "$WEBSITE_PATTERN"; then
            WEBSITE_CHANGED=true
          fi

          if echo "$CHANGED_FILES" | grep -Eq "$ADMIN_PATTERN"; then
            ADMIN_CHANGED=true
          fi

          echo "website_changed=$WEBSITE_CHANGED" >> "$GITHUB_OUTPUT"
          echo "admin_changed=$ADMIN_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Print deploy decision
        run: |
          echo "Website changed: ${{ steps.changed.outputs.website_changed }}"
          echo "Admin changed: ${{ steps.changed.outputs.admin_changed }}"

  deploy-website:
    name: Deploy Website
    needs: [gate-ci, detect-changes]
    if: needs.gate-ci.outputs.can_deploy == 'true' && needs.detect-changes.outputs.website_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate-ci.outputs.head_sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN secret"
            exit 1
          fi
          echo "VERCEL_TOKEN is configured"

      - name: Deploy website
        run: |
          set -euo pipefail
          timeout 8m npx vercel pull --yes --environment=production --cwd apps/website --token=${{ secrets.VERCEL_TOKEN }}
          timeout 20m npx vercel build --prod --cwd apps/website --token=${{ secrets.VERCEL_TOKEN }}
          for attempt in 1 2 3 4 5 6; do
            echo "Deploy prebuilt website attempt ${attempt}/6"
            deploy_log="$(mktemp)"
            timeout 12m npx vercel deploy --prebuilt --prod --yes --cwd apps/website --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee "$deploy_log" || true
            if grep -Eq 'status[[:space:]]*● Error|Failed to process project graph|Could not find ".modules.yaml"|Error: Command "npx nx build|Error: Command "npm run build" exited with 1' "$deploy_log"; then
              echo "Deploy output indicates explicit build failure; failing deployment step."
              exit 1
            fi
            prod_url="$(grep -Eo 'https://[^ ]+\.vercel\.app' "$deploy_log" | tail -n 1 || true)"
            if [ -n "$prod_url" ]; then
              echo "Deploy command produced URL: $prod_url"
              inspect_log="$(mktemp)"
              if timeout 12m npx vercel inspect "$prod_url" --wait --timeout 12m --token=${{ secrets.VERCEL_TOKEN }} >"$inspect_log" 2>&1; then
                cat "$inspect_log"
                echo "Website deployment is ready in production: $prod_url"
                exit 0
              fi
              cat "$inspect_log"

              if grep -Eq 'status[[:space:]]*● Error|Failed to process project graph|Could not find ".modules.yaml"|Error: Command "npx nx build|Error: Command "npm run build" exited with 1' "$inspect_log"; then
                echo "Inspect indicates an explicit build failure; failing deployment step."
                exit 1
              fi
              echo "Inspect did not confirm readiness; retrying deployment attempt..."
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "Website deployment failed after 6 attempts"
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "Retrying website deploy after transient failure in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

  deploy-admin:
    name: Deploy Admin
    needs: [gate-ci, detect-changes]
    if: needs.gate-ci.outputs.can_deploy == 'true' && needs.detect-changes.outputs.admin_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate-ci.outputs.head_sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN secret"
            exit 1
          fi
          echo "VERCEL_TOKEN is configured"

      - name: Deploy admin
        run: |
          set -euo pipefail
          timeout 8m npx vercel pull --yes --environment=production --cwd apps/admin --token=${{ secrets.VERCEL_TOKEN }}
          timeout 20m npx vercel build --prod --cwd apps/admin --token=${{ secrets.VERCEL_TOKEN }}
          for attempt in 1 2 3 4 5 6; do
            echo "Deploy prebuilt admin attempt ${attempt}/6"
            deploy_log="$(mktemp)"
            timeout 12m npx vercel deploy --prebuilt --prod --yes --cwd apps/admin --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee "$deploy_log" || true
            if grep -Eq 'status[[:space:]]*● Error|Failed to process project graph|Could not find ".modules.yaml"|Error: Command "npx nx build|Error: Command "npm run build" exited with 1' "$deploy_log"; then
              echo "Deploy output indicates explicit build failure; failing deployment step."
              exit 1
            fi
            prod_url="$(grep -Eo 'https://[^ ]+\.vercel\.app' "$deploy_log" | tail -n 1 || true)"
            if [ -n "$prod_url" ]; then
              echo "Deploy command produced URL: $prod_url"
              inspect_log="$(mktemp)"
              if timeout 12m npx vercel inspect "$prod_url" --wait --timeout 12m --token=${{ secrets.VERCEL_TOKEN }} >"$inspect_log" 2>&1; then
                cat "$inspect_log"
                echo "Admin deployment is ready in production: $prod_url"
                exit 0
              fi
              cat "$inspect_log"

              if grep -Eq 'status[[:space:]]*● Error|Failed to process project graph|Could not find ".modules.yaml"|Error: Command "npx nx build|Error: Command "npm run build" exited with 1' "$inspect_log"; then
                echo "Inspect indicates an explicit build failure; failing deployment step."
                exit 1
              fi
              echo "Inspect did not confirm readiness; retrying deployment attempt..."
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "Admin deployment failed after 6 attempts"
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "Retrying admin deploy after transient failure in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
