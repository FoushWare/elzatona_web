name: Deploy Main (CI -> CD)

on:
  workflow_run:
    workflows:
      - CI Checks (Lint, Type Check, Build)
    types: [completed]

concurrency:
  group: deploy-main-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  gate-ci:
    name: Validate Required CI Workflows
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      can_deploy: ${{ steps.validate.outputs.can_deploy }}
    steps:
      - name: Validate CI success for main
        id: validate
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "CI workflow did not succeed; skipping deployment."
          fi

  deploy:
    name: Deploy Website Then Admin
    needs: gate-ci
    if: needs.gate-ci.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit

      - name: Validate deployment secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "Missing VERCEL_TOKEN secret"
            exit 1
          fi

      - name: Deploy website
        run: npx vercel deploy --prod --yes --cwd apps/website --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy admin
        run: npx vercel deploy --prod --yes --cwd apps/admin --token=${{ secrets.VERCEL_TOKEN }}
