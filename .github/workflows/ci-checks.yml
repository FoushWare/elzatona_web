name: CI Checks (Lint, Type Check, Build)

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop, "release/**"]
  workflow_dispatch:

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint, Type Check, and Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --no-audit

      - name: Run Prettier formatting check
        run: npm run format:check:tracked
        continue-on-error: false

      - name: Run ESLint check
        run: npm run lint:ci
        continue-on-error: false

      - name: TypeScript type checking
        run: npm run type-check:ci
        continue-on-error: false

      - name: Run unit tests for admin login components
        run: |
          echo "🧪 Running unit tests for admin login components..."
          # Run Vitest tests for common-ui library (AdminLogin components)
          echo "📦 Testing AdminLoginFormMolecule in common-ui..."
          NODE_OPTIONS=--max-old-space-size=768 npx vitest run libs/common-ui/src/components/molecules/AdminLoginFormMolecule.test.tsx

          # Run Vitest tests for admin app (AdminLoginPage)
          echo "📦 Testing AdminLoginPage in apps/admin..."
          NODE_OPTIONS=--max-old-space-size=768 npx vitest run apps/admin/src/app/admin/login/page.test.tsx
        continue-on-error: false
        env:
          NODE_OPTIONS: "--max-old-space-size=768"
          CI: "true"
          # Provide minimal env vars for tests
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY || 'placeholder-key' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'placeholder-secret' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || 'test@example.com' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'test-password' }}

      - name: Build validation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run build:ci
        continue-on-error: false

      - name: Cleanup build artifacts
        if: always()
        run: |
          echo "🧹 Cleaning up build artifacts..."
          rm -rf .next build storybook-static coverage
          echo "✅ Cleanup completed"
