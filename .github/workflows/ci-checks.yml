name: CI Checks (Lint, Type Check, Build)

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop, "release/**"]
  workflow_dispatch:

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint, Type Check, and Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/admin/package-lock.json
            apps/website/package-lock.json

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit

      - name: Run Prettier formatting check
        run: |
          echo "🎨 Running Prettier formatting check..."
          # Use git ls-files so we only check committed/tracked files.
          # Skip symlinks (git tracks them but prettier can't process them).
          FILES=$(git ls-files | grep -E '\.(js|jsx|ts|tsx|json|md|yml|yaml|css|scss|html)$' | while IFS= read -r f; do
            [ -f "$f" ] && [ ! -L "$f" ] && printf '%s\n' "$f"
          done)
          if [ -z "$FILES" ]; then
            echo "No tracked files found for Prettier check."
            exit 0
          fi
          echo "$FILES" | xargs npx prettier --check || (echo "⚠️  Prettier found formatting issues. Run 'npm run format' to fix them." && exit 1)
        continue-on-error: false

      - name: Run ESLint with auto-fix
        run: |
          echo "🔍 Running ESLint with auto-fix..."
          npm run lint:fix || true
        continue-on-error: true
        # Auto-fix doesn't need to fail the workflow

      - name: Run ESLint check
        run: |
          echo "🔍 Running ESLint check..."
          npm run lint
        continue-on-error: false
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"

      - name: TypeScript type checking
        run: |
          echo "📘 Running TypeScript type checking..."
          npm run type-check
        continue-on-error: false
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"
          # Provide minimal env vars for type checking (to avoid type errors)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY || 'placeholder-key' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'placeholder-secret' }}

      - name: Run unit tests for admin login components
        run: |
          echo "🧪 Running unit tests for admin login components..."
          # Run Vitest tests for components library (AdminLogin components)
          echo "📦 Testing AdminLoginFormMolecule and AdminLoginPageTemplate..."
          NODE_OPTIONS=--max-old-space-size=768 npx nx test components --testNamePattern="AdminLogin" --run || echo "⚠️  Vitest tests skipped (may need setup)"
          # Run Jest tests for website app (AdminLoginPage)
          echo "📦 Testing AdminLoginPage..."
          NODE_OPTIONS=--max-old-space-size=768 JEST_MAX_WORKERS=1 npx jest \
            apps/website/src/app/admin/login/page.test.tsx \
            --maxWorkers=1 \
            --silent \
            --coverage=false \
            --config=apps/website/jest.config.js || echo "⚠️  Jest tests skipped"
        continue-on-error: true
        env:
          NODE_OPTIONS: "--max-old-space-size=768"
          CI: "true"
          # Provide minimal env vars for tests
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY || 'placeholder-key' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'placeholder-secret' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || 'test@example.com' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'test-password' }}

      - name: Build validation
        run: |
          echo "🏗️ Running build validation..."
          npm run build
        continue-on-error: false
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"
          NEXT_TELEMETRY_DISABLED: "1"
          # Provide minimal env vars for build (to avoid build errors)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY || 'placeholder-key' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'placeholder-secret' }}

      - name: Cleanup build artifacts
        if: always()
        run: |
          echo "🧹 Cleaning up build artifacts..."
          rm -rf .next build storybook-static coverage
          echo "✅ Cleanup completed"
