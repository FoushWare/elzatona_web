name: SonarCloud Code Analysis

on:
  push:
    branches: [develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate Sonar token is configured
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "SONAR_TOKEN secret is required for SonarCloud analysis"
            exit 1
          fi

      - name: Run lint check
        run: pnpm run lint:ci
        env:
          NODE_OPTIONS: "--max-old-space-size=1536"

      - name: TypeScript type checking
        run: pnpm run type-check:ci
        env:
          NODE_OPTIONS: "--max-old-space-size=1536"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY || 'placeholder-key' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'placeholder-secret' }}

      - name: Generate coverage report for SonarCloud
        run: |
          npx vitest run \
            libs/contexts/src/lib/AdminNavbarVisibilityContext.test.tsx \
            apps/admin/src/app/AdminShell.test.tsx \
            libs/common-ui/src/components/ui/dialog.test.tsx \
            apps/website/src/app/lib/frontend-task-validator.test.ts \
            --coverage \
            --coverage.provider=v8 \
            --coverage.reporter=lcov \
            --coverage.reporter=text-summary
          test -f coverage/lcov.info
        env:
          NODE_OPTIONS: "--max-old-space-size=1536"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: "-Xmx2048m"
        with:
          projectBaseDir: .

      - name: Upload coverage reports
        if: hashFiles('coverage/lcov.info') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true
