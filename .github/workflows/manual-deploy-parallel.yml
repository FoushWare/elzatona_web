name: Manual Deploy (Parallel Website & Admin)

# Manually triggered deployment workflow
# Deploys website and admin in parallel without auto-trigger complexity
on:
  workflow_dispatch:
    inputs:
      deploy_website:
        description: "Deploy website"
        required: true
        type: boolean
        default: true
      deploy_admin:
        description: "Deploy admin"
        required: true
        type: boolean
        default: true
      validate_build_website:
        description: "Validate website build"
        required: true
        type: boolean
        default: true
      validate_build_admin:
        description: "Validate admin build"
        required: true
        type: boolean
        default: true
      ref:
        description: "Git ref (branch/tag/sha) to deploy"
        required: false
        default: "main"

concurrency:
  group: manual-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-website:
    name: Deploy Website
    if: ${{ inputs.deploy_website }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Vercel and Next.js Caching
        uses: actions/cache@v4
        with:
          path: |
            apps/website/.next/cache
          key: ${{ runner.os }}-website-next-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-website-next-cache-

      - name: Validate Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN secret"
            exit 1
          fi
          echo "VERCEL_TOKEN is configured"

      - name: Configure website Vercel project settings
        run: |
          curl -fsS -X PATCH \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"buildCommand":"pnpm --filter website build","outputDirectory":"apps/website/.next","installCommand":"true"}' \
            "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID_WEBSITE }}"

      - name: Validate and build (Local Vercel Build)
        if: ${{ inputs.validate_build_website }}
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEBSITE }}
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
          NEXT_PUBLIC_APP_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy website to Vercel (Prebuilt)
        run: |
          set -euo pipefail

          set_website_aliases() {
            local deployment_url="$1"
            echo "Setting website aliases for: ${deployment_url}"
            timeout 3m npx vercel alias set "${deployment_url}" elzatona-web.com --token=${{ secrets.VERCEL_TOKEN }}

            # Keep www alias best-effort because some projects intentionally omit it.
            if ! timeout 3m npx vercel alias set "${deployment_url}" www.elzatona-web.com --token=${{ secrets.VERCEL_TOKEN }}; then
              echo "www.elzatona-web.com alias not set (continuing)."
            fi
          }

          for attempt in 1 2 3 4 5 6; do
            echo "Deploy website attempt ${attempt}/6"
            deploy_output=$(npx vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
            if [ $? -eq 0 ]; then
                # Extract URL from output if possible, or use standard prod URL for aliasing
                prod_url=$(echo "$deploy_output" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1 || echo "https://elzatona-web.com")
                echo "Admin deployment is ready in production."
                set_website_aliases "$prod_url"
                exit 0
            fi

            if [ "$attempt" -eq 6 ]; then
              echo "Website deployment failed after 6 attempts"
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "Retrying website deploy after transient failure in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEBSITE }}
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

  deploy-admin:
    name: Deploy Admin
    if: ${{ inputs.deploy_admin }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Vercel and Next.js Caching
        uses: actions/cache@v4
        with:
          path: |
            apps/admin/.next/cache
          key: ${{ runner.os }}-next-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-next-cache-

      - name: Validate Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN secret"
            exit 1
          fi
          echo "VERCEL_TOKEN is configured"

      - name: Configure admin Vercel project settings
        run: |
          curl -fsS -X PATCH \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"buildCommand":"pnpm --filter admin build","outputDirectory":"apps/admin/.next","installCommand":"true"}' \
            "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID_ADMIN }}"

      - name: Validate and build (Local Vercel Build)
        if: ${{ inputs.validate_build_admin }}
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
          NEXT_PUBLIC_APP_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy admin to Vercel (Prebuilt)
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            echo "Deploy admin attempt ${attempt}/6"
            if npx vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}; then
              echo "Admin deployment is ready in production."
              exit 0
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "Admin deployment failed after 6 attempts"
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "Retrying admin deploy after transient failure in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
