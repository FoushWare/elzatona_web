name: Manual Deploy (Parallel Website & Admin)

# Manually triggered deployment workflow
# Deploys website and admin in parallel without auto-trigger complexity
on:
  workflow_dispatch:
    inputs:
      deploy_website:
        description: "Deploy website"
        required: true
        type: boolean
        default: true
      deploy_admin:
        description: "Deploy admin"
        required: true
        type: boolean
        default: true
      validate_build_website:
        description: "Validate website build"
        required: true
        type: boolean
        default: true
      validate_build_admin:
        description: "Validate admin build"
        required: true
        type: boolean
        default: true
      ref:
        description: "Git ref (branch/tag/sha) to deploy"
        required: false
        default: "main"

concurrency:
  group: manual-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-website:
    name: Deploy Website
    if: ${{ inputs.deploy_website }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN secret"
            exit 1
          fi
          echo "VERCEL_TOKEN is configured"

      - name: Validate build locally (optional build check)
        if: ${{ inputs.validate_build_website }}
        run: pnpm run build
        env:
          NEXT_PUBLIC_APP_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Pull Vercel Project Settings
        run: npx vercel pull --yes --environment=production --cwd apps/website --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEBSITE }}

      - name: Build website for Vercel
        run: npx vercel build --prod --cwd apps/website --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEBSITE }}

      - name: Deploy website to Vercel
        run: npx vercel deploy --prebuilt --prod --cwd apps/website --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEBSITE }}

  deploy-admin:
    name: Deploy Admin
    if: ${{ inputs.deploy_admin }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN secret"
            exit 1
          fi
          echo "VERCEL_TOKEN is configured"

      - name: Validate build locally (optional build check)
        if: ${{ inputs.validate_build_admin }}
        run: pnpm run build:admin
        env:
          NEXT_PUBLIC_APP_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Pull Vercel Project Settings
        run: npx vercel pull --yes --environment=production --cwd apps/admin --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

      - name: Build admin for Vercel
        run: npx vercel build --prod --cwd apps/admin --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

      - name: Deploy admin to Vercel
        run: npx vercel deploy --prebuilt --prod --cwd apps/admin --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
