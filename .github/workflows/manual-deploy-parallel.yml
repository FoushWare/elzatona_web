name: Manual Deploy (Parallel Website & Admin)

# Manually triggered deployment workflow
# Deploys website and admin in parallel without auto-trigger complexity
on:
  workflow_dispatch:
    inputs:
      deploy_website:
        description: "Deploy website"
        required: true
        type: boolean
        default: true
      deploy_admin:
        description: "Deploy admin"
        required: true
        type: boolean
        default: true
      validate_build_website:
        description: "Validate website build"
        required: true
        type: boolean
        default: true
      validate_build_admin:
        description: "Validate admin build"
        required: true
        type: boolean
        default: true
      ref:
        description: "Git ref (branch/tag/sha) to deploy"
        required: false
        default: "main"

concurrency:
  group: manual-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-website:
    name: Deploy Website
    if: ${{ inputs.deploy_website }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN secret"
            exit 1
          fi
          echo "VERCEL_TOKEN is configured"

      - name: Validate build locally (optional build check)
        if: ${{ inputs.validate_build_website }}
        run: pnpm --dir apps/website run build
        env:
          NEXT_PUBLIC_APP_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Bypass Vercel Nx Plugin (website)
        run: |
          if [ -f nx.json ]; then
            mv nx.json nx.json.bak
          fi

      - name: Deploy website to Vercel
        run: |
          set -euo pipefail
          timeout 8m npx vercel pull --yes --environment=production --cwd apps/website --token=${{ secrets.VERCEL_TOKEN }}
          for attempt in 1 2 3 4 5 6; do
            echo "Deploy website attempt ${attempt}/6"
            deploy_log="$(mktemp)"
            timeout 20m npx vercel deploy --prod --yes --cwd apps/website --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee "$deploy_log" || true
            if grep -Eq 'Failed to process project graph|Could not find ".modules.yaml"|ENOENT: no such file or directory|Error: Command "npx nx build|Error: Command "npm run build" exited with 1' "$deploy_log"; then
              echo "Deploy output indicates explicit build failure; failing deployment step."
              exit 1
            fi
            prod_url="$(grep -Eo 'https://[^ ]+\.vercel\.app' "$deploy_log" | tail -n 1 || true)"
            if [ -n "$prod_url" ]; then
              echo "Deploy command produced URL: $prod_url"
              inspect_log="$(mktemp)"
              if timeout 12m npx vercel inspect "$prod_url" --wait --timeout 12m --token=${{ secrets.VERCEL_TOKEN }} >"$inspect_log" 2>&1; then
                cat "$inspect_log"
                echo "Website deployment is ready in production: $prod_url"
                exit 0
              fi
              cat "$inspect_log"

              if grep -Eq 'Failed to process project graph|Could not find ".modules.yaml"|ENOENT: no such file or directory|Error: Command "npx nx build|Error: Command "npm run build" exited with 1' "$inspect_log"; then
                echo "Inspect indicates an explicit build failure; failing deployment step."
                exit 1
              fi
              echo "Inspect did not confirm readiness; retrying deployment attempt..."
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "Website deployment failed after 6 attempts"
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "Retrying website deploy after transient failure in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEBSITE }}

  deploy-admin:
    name: Deploy Admin
    if: ${{ inputs.deploy_admin }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate Vercel token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN secret"
            exit 1
          fi
          echo "VERCEL_TOKEN is configured"

      - name: Validate build locally (optional build check)
        if: ${{ inputs.validate_build_admin }}
        run: pnpm --dir apps/admin run build
        env:
          NEXT_PUBLIC_APP_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Bypass Vercel Nx Plugin (admin)
        run: |
          if [ -f nx.json ]; then
            mv nx.json nx.json.bak
          fi

      - name: Deploy admin to Vercel
        run: |
          set -euo pipefail
          timeout 8m npx vercel pull --yes --environment=production --cwd apps/admin --token=${{ secrets.VERCEL_TOKEN }}
          for attempt in 1 2 3 4 5 6; do
            echo "Deploy admin attempt ${attempt}/6"
            deploy_log="$(mktemp)"
            timeout 20m npx vercel deploy --prod --yes --cwd apps/admin --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee "$deploy_log" || true
            if grep -Eq 'Failed to process project graph|Could not find ".modules.yaml"|ENOENT: no such file or directory|Error: Command "npx nx build|Error: Command "npm run build" exited with 1' "$deploy_log"; then
              echo "Deploy output indicates explicit build failure; failing deployment step."
              exit 1
            fi
            prod_url="$(grep -Eo 'https://[^ ]+\.vercel\.app' "$deploy_log" | tail -n 1 || true)"
            if [ -n "$prod_url" ]; then
              echo "Deploy command produced URL: $prod_url"
              inspect_log="$(mktemp)"
              if timeout 12m npx vercel inspect "$prod_url" --wait --timeout 12m --token=${{ secrets.VERCEL_TOKEN }} >"$inspect_log" 2>&1; then
                cat "$inspect_log"
                echo "Admin deployment is ready in production: $prod_url"
                exit 0
              fi
              cat "$inspect_log"

              if grep -Eq 'Failed to process project graph|Could not find ".modules.yaml"|ENOENT: no such file or directory|Error: Command "npx nx build|Error: Command "npm run build" exited with 1' "$inspect_log"; then
                echo "Inspect indicates an explicit build failure; failing deployment step."
                exit 1
              fi
              echo "Inspect did not confirm readiness; retrying deployment attempt..."
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "Admin deployment failed after 6 attempts"
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "Retrying admin deploy after transient failure in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
