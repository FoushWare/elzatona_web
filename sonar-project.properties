# SonarQube project configuration
sonar.projectKey=FoushWare_GreatFrontendHub
sonar.organization=foushware
sonar.host.url=https://sonarcloud.io

# Project metadata
sonar.projectName=Elzatona Web Application
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=apps,libs
# Note: Test files are excluded via sonar.exclusions, so sonar.tests is not needed
sonar.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.jsx
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.test.js,**/*.spec.js,**/*.stories.ts,**/*.stories.tsx,**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/tools/**,**/.nx/cache/**,**/fixtures/**

# JavaScript/TypeScript configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=apps/admin/**,libs/common-ui/src/admin/**,libs/contexts/src/lib/AdminAuthContext.tsx,libs/shared-atoms/src/lib/auth.ts,apps/website/jest.fetch.setup.js,apps/website/jest.minimal.setup.js,apps/website/jest.setup.js,libs/utilities/src/lib/api/questions-handler.ts,libs/contexts/src/lib/UserPreferencesContext.tsx
sonar.cpd.exclusions=apps/admin/src/app/admin/content-management/hooks/contentManagementMapping.ts,libs/common-ui/src/admin/content-management/LearningCardsManager.tsx,libs/common-ui/src/admin/content-management/PlansManager.tsx

# Performance and memory settings
# Do not force branch/revision here; SonarCloud derives PR/branch context from CI metadata.

# Build and test reports

# Quality gate
sonar.qualitygate.wait=false

# Ignore known legacy cognitive complexity hotspot pending UI component split
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=libs/common-ui/src/common/NavbarSimple.tsx
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=libs/common-ui/src/common/NavbarSimple.tsx
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e3.resourceKey=libs/utilities/src/lib/api/questions-handler.ts
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=libs/utilities/src/lib/api/questions-handler.ts

# Disable CI analysis to avoid conflict with Automatic Analysis
sonar.ci.auto=false
